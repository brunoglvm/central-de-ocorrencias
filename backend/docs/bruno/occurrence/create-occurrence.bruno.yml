info:
  name: create-occurrence
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/public/occurrences"
  body:
    type: multipart-form
    data:
      - name: occurrence
        type: file
        value:
          - images/occurrence-valid-2_8mb.jpg
        contentType: image/jpeg
      - name: title
        type: text
        value: Vazamento no corredor do bloco B
      - name: description
        type: text
        value: Funcionário identificou vazamento próximo ao elevador durante a inspeção de rotina. O local foi sinalizado para evitar acidentes até a manutenção.
      - name: location
        type: text
        value: Bloco B - 2º andar
      - name: source
        type: text
        value: EMPLOYEE

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
